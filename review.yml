    summary: >-
      Sorbonne University has no centralized public developer portal. Its
      programmatic footprint is open-science infrastructure. Verified live: the
      central HAL OAI-PMH endpoint returns a valid Identify response and the
      Recherche Data Gouv Dataverse Native API version endpoint returns
      {"status":"OK","data":{"version":"6.0"}}. The institutional HAL portal
      (hal.sorbonne-universite.fr) front end is behind Anubis bot protection but
      its data is harvestable through the central HAL API. The official GitHub
      org (sorbonne-universite) exists and is legitimate but hosts zero public
      repositories. No endpoints were fabricated; all APIs cataloged are
      standards-based (OAI-PMH, HAL search, Dataverse) confirmed reachable.
